name: Terraform Plan
on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'terraform/**'
      - 'bootstrap/**'
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
      - 'bootstrap/**'
permissions:
  id-token: write
  contents: read
  pull-requests: write
env:
  TF_VERSION: 1.11.0
  AWS_REGION: ${{ secrets.AWS_REGION }}
  TF_LOG: WARN
  TF_INPUT: false
  TF_IN_AUTOMATION: true
jobs:
  terraform-plan:
    name: Plan Terraform Changes
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: dev
    defaults:
      run:
        working-directory: terraform/us-east-1
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: github-actions-terraform-plan
          skip-aws-sso: true
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Cache Terraform Providers
        uses: actions/cache@v3
        with:
          path: |
            ~/.terraform.d/plugins
            .terraform
          key: ${{ runner.os }}-terraform-${{ env.TF_VERSION }}-${{ hashFiles('terraform/.terraform.lock.hcl') }}
          restore-keys: |
            ${{ runner.os }}-terraform-${{ env.TF_VERSION }}-
            ${{ runner.os }}-terraform-
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}" \
            -upgrade=false \
            -no-color
      - name: Terraform Validate
        run: terraform validate -no-color
      - name: Terraform Format Check
        run: terraform fmt -check -recursive -no-color
      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -parallelism=10 -out=tfplan
        continue-on-error: true
      - name: Save Plan Output
        run: terraform show -no-color tfplan > tfplan.txt
      - name: Upload Plan Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.run_id }}
          path: terraform/us-east-1/tfplan
          retention-days: 1
      - name: Comment PR with Plan
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const planOutput = fs.readFileSync('terraform/us-east-1/tfplan.txt', 'utf8');
              const maxLength = 60000;
              let displayPlan = planOutput;
              if (planOutput.length > maxLength) {
                displayPlan = planOutput.substring(0, maxLength) + '\n\n... (output truncated - see artifact for full plan) ...';
              }

              const status = planOutput.includes('Error') ? '❌ FAILED' : '✅ SUCCESS';
              const changes = planOutput.includes('No changes') ? 'No infrastructure changes' : 'Infrastructure will change';

              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## ${status} - Terraform Plan\n**Changes:** ${changes}\n\n\`\`\`terraform\n${displayPlan}\n\`\`\``
              });
            } catch (error) {
              console.log('Error posting plan comment:', error.message);
            }

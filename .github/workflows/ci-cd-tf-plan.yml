name: Terraform Plan

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'terraform/**'
      - 'bootstrap/**'
      - '.github/workflows/ci-cd-tf-plan.yml'
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
      - 'bootstrap/**'
      - '.github/workflows/ci-cd-tf-plan.yml'

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_VERSION: 1.11.0
  AWS_REGION: ${{ secrets.AWS_REGION }}
  TF_LOG: WARN
  TF_INPUT: false
  TF_IN_AUTOMATION: true

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: dev

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: github-actions-terraform-plan

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Cache Terraform Providers
        uses: actions/cache@v3
        with:
          path: |
            ~/.terraform.d/plugins
            .terraform
          key: ${{ runner.os }}-terraform-${{ env.TF_VERSION }}-${{ hashFiles('terraform/.terraform.lock.hcl') }}
          restore-keys: |
            ${{ runner.os }}-terraform-${{ env.TF_VERSION }}-
            ${{ runner.os }}-terraform-

      - name: Terraform Init
        run: terraform init -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" -backend-config="key=terraform.tfstate" -backend-config="region=${{ secrets.AWS_REGION }}" -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}" -upgrade=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Plan
        run: terraform plan -no-color -parallelism=10 -out=tfplan 2>&1 | tee tfplan.txt

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.run_id }}
          path: terraform/tfplan
          retention-days: 1

      - name: Post Plan Summary to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('terraform/tfplan.txt', 'utf8');

            // Limit output to 65k characters (GitHub comment limit)
            const maxLength = 65000;
            let displayOutput = planOutput;
            if (planOutput.length > maxLength) {
              displayOutput = planOutput.substring(0, maxLength) + '\n\n... (output truncated) ...';
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 📋 Terraform Plan\n\`\`\`terraform\n${displayOutput}\n\`\`\``
            });

      - name: Add Plan Summary Badge
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const planOutput = require('fs').readFileSync('terraform/tfplan.txt', 'utf8');

            let badge = '✅ No changes';
            if (planOutput.includes('will be created')) badge = '🟢 Resources will be created';
            if (planOutput.includes('will be updated')) badge = '🟡 Resources will be updated';
            if (planOutput.includes('will be destroyed')) badge = '🔴 Resources will be destroyed';
            if (planOutput.includes('Error')) badge = '❌ Plan failed';

            console.log(badge);
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Status: ${badge}`
            });

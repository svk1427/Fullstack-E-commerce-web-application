name: Terraform Apply
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
      - 'bootstrap/**'
permissions:
  id-token: write
  contents: read
env:
  TF_VERSION: 1.11.0
  AWS_REGION: ${{ secrets.AWS_REGION }}
  TF_LOG: WARN
  TF_INPUT: false
  TF_IN_AUTOMATION: true
jobs:
  terraform-plan-job:
    name: Terraform Plan (Pre-approval)
    runs-on: ubuntu-latest
    environment: dev
    timeout-minutes: 30
    defaults:
      run:
        working-directory: terraform
    outputs:
      plan-status: ${{ steps.plan.outcome }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: github-actions-terraform-plan
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Cache Terraform Providers
        uses: actions/cache@v3
        with:
          path: |
            ~/.terraform.d/plugins
            .terraform
          key: ${{ runner.os }}-terraform-${{ env.TF_VERSION }}-${{ hashFiles('terraform/.terraform.lock.hcl') }}
          restore-keys: |
            ${{ runner.os }}-terraform-${{ env.TF_VERSION }}-
            ${{ runner.os }}-terraform-
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}" \
            -upgrade=false \
            -no-color
      - name: Terraform Validate
        run: terraform validate -no-color
      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -parallelism=10 -out=tfplan
        continue-on-error: true
      - name: Save Plan Output
        if: always()
        run: terraform show -no-color tfplan > tfplan.txt
      - name: Upload Plan Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-pre-apply-${{ github.run_id }}
          path: terraform/tfplan
          retention-days: 1
  terraform-apply-job:
    name: Terraform Apply (Requires Approval)
    runs-on: ubuntu-latest
    needs: terraform-plan-job
    environment: production
    timeout-minutes: 30
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: github-actions-terraform-apply
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Cache Terraform Providers
        uses: actions/cache@v3
        with:
          path: |
            ~/.terraform.d/plugins
            .terraform
          key: ${{ runner.os }}-terraform-${{ env.TF_VERSION }}-${{ hashFiles('terraform/.terraform.lock.hcl') }}
          restore-keys: |
            ${{ runner.os }}-terraform-${{ env.TF_VERSION }}-
            ${{ runner.os }}-terraform-
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}" \
            -upgrade=false \
            -no-color
      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-pre-apply-${{ github.run_id }}
          path: terraform/
      - name: Terraform Apply
        run: terraform apply -no-color -input=false tfplan
      - name: Export Terraform Outputs
        run: terraform output -json > outputs.json
      - name: Upload Outputs
        uses: actions/upload-artifact@v4
        with:
          name: tf-outputs-${{ github.run_id }}
          path: terraform/outputs.json
          retention-days: 30
      - name: Post Apply Summary
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: 'production',
              description: 'Terraform Apply Completed',
              required_contexts: [],
              auto_merge: false
            }).catch(err => console.log('Deployment marker creation skipped'));
